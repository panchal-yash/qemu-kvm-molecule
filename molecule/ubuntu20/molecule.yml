---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: ubuntu20
    image: ${HOME}/qemu-images/focal-server-cloudimg-amd64.raw
    memory: 4096
    cpus: 2
    disk_size: 12G
    ssh_port: 2234
    ssh_user: ubuntu
    ssh_key: ~/.ssh/id_rsa
    disk_interface: virtio

provisioner:
  name: ansible
  log: true
  inventory:
    host_vars:
      ubuntu20:
        ansible_python_interpreter: /usr/bin/python3.9
  playbooks:
    create: ../shared/create.yml
    prepare: ../shared/prepare.yml
    destroy: ../shared/destroy.yml
    converge: ../shared/converge.yml

verifier:
  name: ansible
