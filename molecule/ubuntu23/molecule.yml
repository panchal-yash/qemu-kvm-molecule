---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: ubuntu23
    image: /var/lib/libvirt/images/mantic-server-cloudimg-amd64.raw
    memory: 2048
    cpus: 2
    disk_size: 20G
    ssh_port: 2234
    ssh_user: ubuntu
    ssh_key: ~/.ssh/id_rsa
    disk_interface: virtio

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../shared/create.yml
    destroy: ../shared/destroy.yml
    converge: ../shared/converge.yml

verifier:
  name: ansible
