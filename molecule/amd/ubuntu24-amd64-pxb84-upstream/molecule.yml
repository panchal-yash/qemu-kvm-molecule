---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: ubuntu24-amd64-pxb84-upstream
    image: ${HOME}/qemu-images/noble-server-cloudimg-amd64.raw
    memory: 2048
    cpus: 2
    disk_size: 32G
    ssh_port: 2314
    ssh_user: ubuntu
    ssh_key: ~/.ssh/id_rsa

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../../shared/create.yml
    prepare: ../../shared/prepare.yml
    destroy: ../../shared/destroy.yml
    converge: ../../shared/converge-pxb84-upstream.yml

verifier:
  name: ansible
