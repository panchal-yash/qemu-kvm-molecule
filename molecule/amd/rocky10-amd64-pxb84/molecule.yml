---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: rocky10-amd64-pxb84
    image: ${HOME}/qemu-images/Rocky-10-GenericCloud.latest.x86_64.raw
    memory: 2048
    cpus: 2
    disk_size: 12G
    ssh_port: 2318
    ssh_user: rocky
    ssh_key: ~/.ssh/id_rsa
    disk_interface: virtio

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../../shared/create.yml
    prepare: ../../shared/prepare.yml
    destroy: ../../shared/destroy.yml
    converge: ../../shared/converge-pxb84.yml

verifier:
  name: ansible
