---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: oraclelinux9-amd64-pxb84-upstream
    image: ${HOME}/qemu-images/oraclelinux-9-amd64.raw
    memory: 2048
    cpus: 2
    disk_size: 12G
    ssh_port: 2323
    ssh_user: cloud-user
    ssh_key: ~/.ssh/id_rsa
    disk_interface: virtio

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../../shared/create.yml
    prepare: ../../shared/prepare.yml
    destroy: ../../shared/destroy.yml
    converge: ../../shared/converge-pxb84-upstream.yml

verifier:
  name: ansible
