---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: oraclelinux10-amd64-pxb84
    image: ${HOME}/qemu-images/oraclelinux-10-amd64.raw
    memory: 2048
    cpus: 2
    disk_size: 12G
    ssh_port: 2324
    ssh_user: cloud-user
    ssh_key: ~/.ssh/id_rsa

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../../shared/create.yml
    prepare: ../../shared/prepare.yml
    destroy: ../../shared/destroy.yml
    converge: ../../shared/converge-pxb84.yml

verifier:
  name: ansible
