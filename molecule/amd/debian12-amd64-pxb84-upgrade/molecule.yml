---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: debian12-amd64-pxb84-upgrade
    image: ${HOME}/qemu-images/debian-12-genericcloud-amd64.raw
    memory: 2048
    cpus: 2
    disk_size: 12G
    ssh_port: 2304
    ssh_user: debian
    ssh_key: ~/.ssh/id_rsa

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../../shared/create.yml
    prepare: ../../shared/prepare.yml
    destroy: ../../shared/destroy.yml
    converge: ../../shared/converge-pxb84-upgrade.yml

verifier:
  name: ansible
