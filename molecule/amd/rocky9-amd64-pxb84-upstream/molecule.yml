---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: rocky9-amd64-pxb84-upstream
    image: ${HOME}/qemu-images/Rocky-9-GenericCloud.latest.x86_64.raw
    memory: 2048
    cpus: 2
    disk_size: 20G
    ssh_port: 2317
    ssh_user: rocky
    ssh_key: ~/.ssh/id_rsa

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../../shared/create.yml
    prepare: ../../shared/prepare.yml
    destroy: ../../shared/destroy.yml
    converge: ../../shared/converge-pxb84-upstream.yml

verifier:
  name: ansible
