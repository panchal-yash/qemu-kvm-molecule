---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: oraclelinux9-arm64-ps84-major_upgrade_to
    arch: arm64
    image: ${HOME}/qemu-images/oraclelinux-9-arm64.raw
    memory: 2048
    cpus: 2
    disk_size: 32G
    ssh_port: 2286
    ssh_user: cloud-user
    ssh_key: ~/.ssh/id_rsa
    disk_interface: virtio

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../../shared/create.yml
    prepare: ../../shared/prepare.yml
    destroy: ../../shared/destroy.yml
    converge: ../../shared/converge-ps84-major_upgrade_to.yml

verifier:
  name: ansible
