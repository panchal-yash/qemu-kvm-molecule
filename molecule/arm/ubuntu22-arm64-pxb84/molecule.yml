---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: ubuntu22-arm64-pxb84
    arch: arm64
    image: ${HOME}/qemu-images/jammy-server-cloudimg-arm64.raw
    memory: 2048
    cpus: 2
    disk_size: 20G
    ssh_port: 2259
    ssh_user: ubuntu
    ssh_key: ~/.ssh/id_rsa

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../../shared/create.yml
    prepare: ../../shared/prepare.yml
    destroy: ../../shared/destroy.yml
    converge: ../../shared/converge-pxb84.yml

verifier:
  name: ansible
