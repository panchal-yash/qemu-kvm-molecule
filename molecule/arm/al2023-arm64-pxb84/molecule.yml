---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: al2023-arm64-pxb84
    arch: arm64
    image: ${HOME}/qemu-images/al2023-arm64.raw
    memory: 2048
    cpus: 2
    disk_size: 32G
    ssh_port: 2277
    ssh_user: ec2-user
    ssh_key: ~/.ssh/id_rsa
    disk_interface: virtio

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../../shared/create.yml
    prepare: ../../shared/prepare.yml
    destroy: ../../shared/destroy.yml
    converge: ../../shared/converge-pxb84.yml

verifier:
  name: ansible
