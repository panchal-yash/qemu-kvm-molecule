---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: rocky10-arm64-pxb84-1
    arch: arm64
    image: ${HOME}/qemu-images/Rocky-10-GenericCloud.latest.aarch64.raw
    memory: 2048
    cpus: 2
    disk_size: 32G
    ssh_port: 2285
    ssh_user: rocky
    ssh_key: ~/.ssh/id_rsa
    disk_interface: virtio

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../shared/create.yml
    prepare: ../shared/prepare.yml
    destroy: ../shared/destroy.yml
    converge: ../shared/converge-pxb84.yml

verifier:
  name: ansible
