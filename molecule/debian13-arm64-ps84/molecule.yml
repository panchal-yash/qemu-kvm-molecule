---
driver:
  name: default
  options:
    managed: true

platforms:
  - name: debian13-arm64-ps84
    arch: arm64
    image: ${HOME}/qemu-images/debian-13-genericcloud-arm64.raw
    memory: 2048
    cpus: 2
    disk_size: 32G
    ssh_port: 2281
    ssh_user: debian
    ssh_key: ~/.ssh/id_rsa
    disk_interface: virtio

provisioner:
  name: ansible
  log: true
  playbooks:
    create: ../shared/create.yml
    prepare: ../shared/prepare.yml
    destroy: ../shared/destroy.yml
    converge: ../shared/converge-ps84.yml

verifier:
  name: ansible
