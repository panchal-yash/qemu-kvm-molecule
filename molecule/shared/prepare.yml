---
# Currently a no-op. Kept wired into every molecule.yml so future per-distro
# preflight tasks have a place to live without changing scenario configs.
# Uses gather_facts: false because some targets (Rocky 8) ship Python 3.6 only
# and we don't want a setup-module failure during the empty prepare phase.
- name: Prepare hosts (no-op)
  hosts: all
  gather_facts: false
  tasks: []
